# Cloudflare Worker that renders Open Graph PNGs for h2oatlas.ee.
# Deploy: cd og-worker && npx wrangler deploy
# Local:  cd og-worker && npx wrangler dev   (serves http://localhost:8787)

name = "h2oatlas-og"
main = "src/index.ts"
compatibility_date = "2024-09-01"
workers_dev = true

# Custom domain. With `custom_domain = true`, wrangler provisions the DNS
# record + SSL on `og.h2oatlas.ee` automatically (zone must be in the same
# Cloudflare account). No manual dashboard step required.
routes = [
  { pattern = "og.h2oatlas.ee", custom_domain = true }
]

[vars]
OG_INDEX_URL = "https://h2oatlas.ee/data/og-index.json"
