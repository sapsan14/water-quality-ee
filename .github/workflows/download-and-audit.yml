name: "Phase 10b: Download XML data + full-corpus audit"

# One-shot workflow: downloads opendata XML from vtiav.sm.ee, runs the
# XML parity check and the label-vs-norms audit on the full corpus,
# and commits results (data/raw/*.xml + data/audit/*.csv + audit log)
# back to the triggering branch. Delete this file after use.

on:
  push:
    branches:
      - claude/phase-10b-full-corpus-audit
    paths:
      - '.github/workflows/download-and-audit.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  download-and-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pyarrow

      - name: Download XML data (all 4 domains)
        run: |
          python -c "
          from src.data_loader import load_all
          df = load_all()
          print(f'Loaded {len(df)} rows')
          print(df['domain'].value_counts().to_string())
          print(f'Years: {sorted(df[\"sample_date\"].dt.year.dropna().unique().tolist())}')
          " 2>&1 | tee data_loader_log.txt

      - name: List cached XML files
        run: |
          echo "=== data/raw/ contents ==="
          ls -lh data/raw/*.xml 2>/dev/null || echo "No XML files found"
          echo ""
          echo "Total XML size:"
          du -sh data/raw/ 2>/dev/null || echo "N/A"

      - name: Run XML parity check
        run: |
          python scripts/audit_xml_field_coverage.py --out data/audit/xml_field_inventory.csv 2>&1 | tee xml_parity_log.txt

      - name: Run full-corpus audit
        run: |
          python -c "
          import pandas as pd
          from datetime import datetime
          from src.data_loader import load_all
          from src.audit.label_vs_norms import audit_dataframe, audit_dataframe_with_bathing_aggregation, BUCKETS

          df = load_all()
          print(f'Total rows: {len(df)}')
          print(f'Domains: {df[\"domain\"].value_counts().to_dict()}')
          print()

          # Standard audit
          audited = audit_dataframe(df)
          n_lab = audited['compliant'].notna().sum()
          bc = audited['bucket'].value_counts()
          agree = bc.get('agree_pass', 0) + bc.get('agree_violate', 0)
          print('=== Standard audit (per-probe) ===')
          print(f'n_labelled: {n_lab}')
          print(f'agree_rate: {agree/n_lab:.4f}')
          for b in BUCKETS:
              print(f'  {b}: {bc.get(b, 0)}')
          print()
          print('By domain:')
          print(audited.groupby(['domain','bucket']).size().unstack(fill_value=0).to_string())
          print()

          # With bathing aggregation
          if 'location_key' in df.columns and 'sample_date' in df.columns:
              agg = audit_dataframe_with_bathing_aggregation(df)
              bc_agg = agg['bucket'].value_counts()
              agree_agg = bc_agg.get('agree_pass', 0) + bc_agg.get('agree_violate', 0)
              print('=== With bathing aggregation (EU 2006/7/EC) ===')
              print(f'agree_rate: {agree_agg/n_lab:.4f}')
              for b in BUCKETS:
                  print(f'  {b}: {bc_agg.get(b, 0)}')
          else:
              print('location_key or sample_date missing; bathing aggregation skipped')

          # Save parquet
          out = f'data/audit/divergences_full_{datetime.utcnow().strftime(\"%Y-%m-%d\")}.parquet'
          persisted = audited.copy()
          for col in ('violated_params', 'unmeasured_norm_params'):
              if col in persisted.columns:
                  persisted[col] = persisted[col].apply(lambda xs: ','.join(xs) if isinstance(xs, list) else '')
          persisted.to_parquet(out, index=False)
          print(f'Wrote: {out}')
          " 2>&1 | tee full_audit_log.txt

      - name: Run tests (sanity check)
        run: pytest tests/ -q

      - name: Commit data + audit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove data/raw/ and data/audit/ from .gitignore temporarily
          sed -i '/^data\/raw\//d' .gitignore
          sed -i '/^data\/audit\//d' .gitignore

          git add .gitignore
          git add data/raw/*.xml || true
          git add data/audit/ || true
          git add data_loader_log.txt xml_parity_log.txt full_audit_log.txt

          git commit -m "ci: download XML data + run full-corpus audit (phase 10b)

          One-shot GitHub Actions run: downloaded opendata XML from vtiav.sm.ee,
          ran XML parity check (scripts/audit_xml_field_coverage.py) and
          label-vs-norms audit on the full corpus (all 4 domains × 6 years).

          Artifacts:
          - data/raw/*.xml — cached XML files
          - data/audit/xml_field_inventory.csv — parser parity report
          - data/audit/divergences_full_*.parquet — per-probe audit results
          - *_log.txt — console output from each step
          " || echo "Nothing to commit"

          git push || echo "Push failed"
