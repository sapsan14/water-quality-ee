# Aletheia backend healthcheck — forces --mode backend so a missing or
# unreachable backend fails loudly instead of silently falling back to the
# local self-signed signer (which is what the weekly citizen-snapshot workflow
# does via --mode auto).
#
# Use case: after rotating ALETHEIA_BACKEND_URL / ALETHEIA_API_KEY, or when
# we want to confirm the backend is up without rebuilding the full snapshot.
#
# The workflow is workflow_dispatch-only (no cron, no push trigger) and makes
# no commits: the .aep is produced in a tmp dir, inspected, and discarded.

name: Aletheia healthcheck

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

jobs:
  sign-and-inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install signer dependencies
        run: pip install 'cryptography>=42' 'requests>=2.31'

      - name: Check that secrets are populated
        env:
          ALETHEIA_BACKEND_URL: ${{ secrets.ALETHEIA_BACKEND_URL }}
          ALETHEIA_API_KEY: ${{ secrets.ALETHEIA_API_KEY }}
        run: |
          if [ -z "${ALETHEIA_BACKEND_URL}" ]; then
            echo "::error::ALETHEIA_BACKEND_URL secret is empty. Set it under Settings → Secrets → Actions."
            exit 2
          fi
          echo "ALETHEIA_BACKEND_URL is set (value masked)."
          if [ -z "${ALETHEIA_API_KEY}" ]; then
            echo "::warning::ALETHEIA_API_KEY is empty — signing will proceed without a bearer token."
          else
            echo "ALETHEIA_API_KEY is set (value masked)."
          fi

      - name: Sign current snapshot via backend (forced)
        env:
          ALETHEIA_BACKEND_URL: ${{ secrets.ALETHEIA_BACKEND_URL }}
          ALETHEIA_API_KEY: ${{ secrets.ALETHEIA_API_KEY }}
        run: |
          mkdir -p /tmp/aletheia-healthcheck
          python scripts/sign_snapshot.py \
            --input citizen-service/artifacts/snapshot.json \
            --output-dir /tmp/aletheia-healthcheck \
            --mode backend

      - name: Inspect returned .aep bundle
        run: |
          AEP=/tmp/aletheia-healthcheck/snapshot.aep
          if [ ! -f "${AEP}" ]; then
            echo "::error::Backend did not produce ${AEP}."
            exit 1
          fi
          SIZE=$(stat -c %s "${AEP}")
          echo "Bundle size: ${SIZE} bytes"
          if [ "${SIZE}" -lt 1024 ]; then
            echo "::error::Bundle suspiciously small (< 1KB); likely an error page."
            exit 1
          fi
          python - <<'PY'
          import hashlib, json, zipfile
          path = "/tmp/aletheia-healthcheck/snapshot.aep"
          with zipfile.ZipFile(path) as zf:
              names = zf.namelist()
              print("Entries:", names)
              if "manifest.json" not in names:
                  raise SystemExit("manifest.json missing — not a valid .aep bundle")
              manifest = json.loads(zf.read("manifest.json"))
              sig = zf.read("signature.b64").decode("ascii", errors="replace").strip() if "signature.b64" in names else ""
              payload_bytes = zf.read("payload.json") if "payload.json" in names else b""
              signed_manifest_bytes = (
                  zf.read("signed_manifest.json") if "signed_manifest.json" in names else None
              )
          mode = manifest.get("mode")
          print("manifest.mode          =", mode)
          print("manifest.algorithm     =", manifest.get("algorithm"))
          print("manifest.signed_at     =", manifest.get("signed_at"))
          print("manifest.signer        =", manifest.get("signer"))
          print("manifest.aletheia_id   =", manifest.get("aletheia_id"))
          print("manifest.aletheia_uuid =", manifest.get("aletheia_uuid"))
          print("manifest.policy_ver    =", manifest.get("policy_version"))
          print("manifest.tsa_included  =", manifest.get("tsa_token_included"))
          print("signature.b64 length   =", len(sig), "chars")
          if mode == "local_dev":
              raise SystemExit(
                  "Backend signing fell back to local_dev — this means the "
                  "backend responded but the script's backend path was not taken. "
                  "This should not happen with --mode backend."
              )
          if not sig:
              raise SystemExit("signature.b64 is empty — backend did not return a signature.")
          if not manifest.get("aletheia_uuid"):
              raise SystemExit("aletheia_uuid missing — backend response was malformed.")
          if signed_manifest_bytes is None:
              raise SystemExit(
                  "signed_manifest.json missing — expected in aep_format_version >= 0.2. "
                  "Backend signs the attestation (not the full payload) to fit the 512 KiB cap."
              )
          signed_manifest = json.loads(signed_manifest_bytes)
          print("signed_manifest.dataset        =", signed_manifest.get("dataset"))
          print("signed_manifest.snapshot_sha256=", signed_manifest.get("snapshot_sha256"))
          print("signed_manifest.bytes          =", signed_manifest.get("bytes"))
          print("signed_manifest.places_count   =", signed_manifest.get("places_count"))
          # Integrity chain: payload.json bytes must match signed_manifest.snapshot_sha256.
          actual_payload_hash = hashlib.sha256(payload_bytes).hexdigest()
          expected_payload_hash = str(signed_manifest.get("snapshot_sha256") or "")
          if actual_payload_hash != expected_payload_hash:
              raise SystemExit(
                  f"payload.json sha256={actual_payload_hash} != signed_manifest.snapshot_sha256={expected_payload_hash}"
              )
          # Integrity chain: signed_manifest.json bytes must match manifest.signed_manifest_sha256.
          actual_manifest_hash = hashlib.sha256(signed_manifest_bytes).hexdigest()
          expected_manifest_hash = str(manifest.get("signed_manifest_sha256") or "")
          if expected_manifest_hash and actual_manifest_hash != expected_manifest_hash:
              raise SystemExit(
                  f"signed_manifest.json sha256={actual_manifest_hash} != manifest.signed_manifest_sha256={expected_manifest_hash}"
              )
          print("HEALTHCHECK OK — backend signed snapshot; mode=" + str(mode))
          PY
