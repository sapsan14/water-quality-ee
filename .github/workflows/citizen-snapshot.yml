# Обновление данных и модели для citizen-service.
#
# Расписание (cron — full): снимок с 4 моделями + координаты.
#   Понедельник  05:00 UTC
#   1-е число    04:00 UTC
#
# Ручной запуск: Actions → Citizen snapshot → mode по умолчанию full; map-only — только если нужен быстрый снимок без ML.
# Защита: ручной map-only поверх существующего [full]-снэпшота отказывается перезаписывать модельный слой,
# пока не передан вход force_overwrite_full=true. Cron всегда mode=full и проверкой не блокируется.
#
# Координаты (каскад):
#   1. EEA Bathing Water FeatureServer — официальные GPS купальных мест ЕС (supluskoha, без ключа)
#   2. veevargid.xml — координаты объектов водопровода из vtiav.sm.ee (veevark, без ключа)
#   3. Google Maps Geocoding → Geoapify — полный каскад для всех доменов.
#   4. patch_geocode_approximate.py — дополнительный проход для approximate_ee точек.
# Секреты: GOOGLE_MAPS_GEOCODING_API_KEY, GEOAPIFY_API_KEY.
# Лимит HTTP: dispatch → из inputs; cron → 4000. Кэши и артефакты коммитятся в репо.

name: Citizen snapshot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "full — данные + 4 модели + координаты. map-only — быстро, без прогнозов моделей."
        type: choice
        required: true
        default: full
        options:
          - full
          - map-only
      geocode_limit:
        description: "Лимит HTTP на каскад координат за этот запуск (Google/Geoapify)."
        type: string
        required: false
        default: "1200"
      force_overwrite_full:
        description: "Разрешить [map-only] перезаписать существующий [full] снэпшот. По умолчанию — нет: защита от случайной потери модельного слоя."
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "0 5 * * 1"
    - cron: "0 4 1 * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Режим снимка и лимит геокода
        id: wf
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            m='${{ github.event.inputs.mode }}'
            echo "mode=${m:-full}" >> "$GITHUB_OUTPUT"
            lim='${{ github.event.inputs.geocode_limit }}'
            echo "geocode=${lim:-1200}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "geocode=4000" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Защита от случайной потери модельного слоя.
      # Cron всегда ставит mode=full и не доходит до этой ветки. Только
      # ручной workflow_dispatch с mode=map-only может попасть сюда. Если
      # текущий снэпшот уже содержит модельные предсказания (has_model_predictions=true)
      # и пользователь явно не передал force_overwrite_full=true, шаг падает
      # с понятным сообщением. Это блокирует ситуацию 27 апреля 2026,
      # когда три ручных map-only диспатча подряд затёрли свежий cron-[full].
      - name: Guard — block [map-only] when last snapshot is [full]
        if: steps.wf.outputs.mode == 'map-only' && github.event.inputs.force_overwrite_full != 'true'
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          path = Path("citizen-service/artifacts/snapshot.json")
          if not path.exists():
              print("::notice::Snapshot не найден; map-only продолжает (это первый билд).")
              sys.exit(0)
          try:
              meta = json.loads(path.read_text())
          except Exception as e:
              print(f"::warning::Не удалось распарсить snapshot.json ({e}); пропускаю проверку.")
              sys.exit(0)
          has_model = bool(meta.get("has_model_predictions"))
          model_version = meta.get("model_version") or "?"
          model_trained_at = meta.get("model_trained_at") or "?"
          if not has_model:
              print(f"::notice::Текущий снэпшот сам по себе [map-only] (model_version={model_version}); продолжаю.")
              sys.exit(0)
          msg = (
              f"Текущий committed snapshot — [full] (model_version={model_version}, "
              f"model_trained_at={model_trained_at}). Запуск [map-only] перезаписал бы "
              f"модельный слой. Если это намеренно, перезапусти workflow_dispatch с "
              f"force_overwrite_full=true. Иначе используй mode=full."
          )
          print(f"::error::{msg}")
          sys.exit(1)
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', 'citizen-service/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies (map-only — slim)
        if: steps.wf.outputs.mode != 'full'
        run: |
          pip install -e .
          pip install -r citizen-service/requirements.txt

      - name: Install dependencies (full — все ML-зависимости)
        if: steps.wf.outputs.mode == 'full'
        run: |
          pip install -e .
          pip install -r requirements.txt
          pip install -r citizen-service/requirements.txt

      - name: Download open data from vtiav.sm.ee
        id: download
        run: |
          python src/data_loader.py && echo "status=ok" >> "$GITHUB_OUTPUT" || echo "status=fallback" >> "$GITHUB_OUTPUT"

      - name: Warn if data download failed (using cached XML)
        if: steps.download.outputs.status == 'fallback'
        run: |
          echo "::warning::vtiav.sm.ee недоступен или вернул ошибку — используем кэшированный XML из предыдущего запуска."

      - name: Build snapshot — map-only (данные + координаты, без модели)
        if: steps.wf.outputs.mode != 'full'
        env:
          GOOGLE_MAPS_GEOCODING_API_KEY: ${{ secrets.GOOGLE_MAPS_GEOCODING_API_KEY }}
          GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
        run: |
          python citizen-service/scripts/build_citizen_snapshot.py \
            --map-only \
            --infer-county \
            --resolve-coordinates \
            --geocode-limit "${{ steps.wf.outputs.geocode }}" \
            --log-level INFO

      - name: Build snapshot — full (данные + 4 модели + координаты)
        if: steps.wf.outputs.mode == 'full'
        env:
          GOOGLE_MAPS_GEOCODING_API_KEY: ${{ secrets.GOOGLE_MAPS_GEOCODING_API_KEY }}
          GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
        run: |
          python citizen-service/scripts/build_citizen_snapshot.py \
            --infer-county \
            --resolve-coordinates \
            --geocode-limit "${{ steps.wf.outputs.geocode }}" \
            --log-level INFO

      - name: Enrich coordinates (EEA bathing water → veevargid.xml → Google/Geoapify cache)
        env:
          GOOGLE_MAPS_GEOCODING_API_KEY: ${{ secrets.GOOGLE_MAPS_GEOCODING_API_KEY }}
          GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
        run: |
          python citizen-service/scripts/enrich_coordinates.py \
            --limit 0 \
            --quiet

      - name: Geocode approximate_ee points (Google → Geoapify cascade)
        env:
          GOOGLE_MAPS_GEOCODING_API_KEY: ${{ secrets.GOOGLE_MAPS_GEOCODING_API_KEY }}
          GEOAPIFY_API_KEY: ${{ secrets.GEOAPIFY_API_KEY }}
        run: |
          python citizen-service/scripts/patch_geocode_approximate.py

      - name: Export frontend snapshot JSON
        run: |
          python citizen-service/scripts/export_frontend_snapshot.py

      # AI Act Art 15: drift monitor. Warns on distribution shift between
      # training window (2021–2024) and the freshest year; logs PSI/KL and
      # annotates the workflow run. Does not block publication — maintainers
      # review WARN/ALERT runs manually per docs/human_oversight.md §3.
      - name: Drift monitor (AI Act Art 15 observability)
        if: steps.wf.outputs.mode == 'full'
        continue-on-error: true
        run: |
          mkdir -p data/audit
          python scripts/drift_monitor.py \
            --json-out "data/audit/drift_$(date -u +%Y-%m-%dT%H%M%S).json" \
            --fail-on never

      # AI Act Art 12: signed .aep evidence package. Primary: Aletheia backend
      # (ALETHEIA_BACKEND_URL). Fallback: local RSA-4096 signer (dev). See
      # docs/key_management.md for key lifecycle, docs/ai_act_self_assessment.md §7.
      - name: Install signer dependencies
        run: pip install 'cryptography>=42' 'requests>=2.31'

      # Idempotently register / refresh this repo's DATASET_PUBLISHER agent in
      # Aletheia (RFC #72 manifest pattern). On the first run the URN in
      # agent.yaml is created on the API key's tenant; on subsequent runs it
      # patches mutable fields in place. continue-on-error so forks / PRs
      # without ALETHEIA_API_KEY don't break the build — the sign step's
      # local-dev fallback handles those.
      - name: Sync agent.yaml to Aletheia (idempotent)
        continue-on-error: true
        env:
          EATF_API_KEY: ${{ secrets.ALETHEIA_API_KEY }}
          EATF_BASE_URL: ${{ secrets.ALETHEIA_BACKEND_URL }}
        run: |
          if [ -z "$EATF_API_KEY" ]; then
            echo "ALETHEIA_API_KEY not set; skipping agent sync (local-dev fallback)."
            exit 0
          fi
          npx -y @eatf/cli@latest agents sync agent.yaml

      - name: Sign snapshot → .aep
        env:
          ALETHEIA_BACKEND_URL: ${{ secrets.ALETHEIA_BACKEND_URL }}
          ALETHEIA_API_KEY: ${{ secrets.ALETHEIA_API_KEY }}
          # URN copied from agent.yaml; the same constant value lives in
          # both places so the workflow does not need to introspect YAML.
          # Stored as a secret so it stays opaque in PR diffs.
          ALETHEIA_AGENT_ID: ${{ secrets.ALETHEIA_AGENT_ID }}
        run: |
          python scripts/sign_snapshot.py \
            --input citizen-service/artifacts/snapshot.json \
            --output-dir citizen-service/artifacts \
            --mode auto

      # Publish the .aep alongside the public snapshot so the /verify page
      # can fetch `/data/snapshot.aep` for the "Verify the current snapshot"
      # button. The file changes every run and is fetched with `cache: "no-store"`
      # from the frontend, so no cache-bust query string is needed.
      - name: Publish .aep + .sig.json to frontend/public/data/
        run: |
          mkdir -p frontend/public/data
          cp citizen-service/artifacts/snapshot.aep frontend/public/data/snapshot.aep
          cp citizen-service/artifacts/snapshot.sig.json frontend/public/data/snapshot.sig.json

      - name: Commit and push refreshed snapshot + model + geocode caches
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            citizen-service/artifacts/snapshot.json \
            citizen-service/artifacts/snapshot.aep \
            citizen-service/artifacts/snapshot.sig.json \
            citizen-service/artifacts/citizen_model.joblib \
            citizen-service/data/coordinate_resolve_cache.json \
            citizen-service/data/geocode_cache.json \
            citizen-service/data/paged_address_cache.json \
            frontend/public/data/snapshot.frontend.json \
            frontend/public/data/snapshot.history.json \
            frontend/public/data/snapshot.aep \
            frontend/public/data/snapshot.sig.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(citizen): refresh snapshot [${{ steps.wf.outputs.mode }}]"
            git pull --rebase origin main
            git push
          fi

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: citizen-snapshot-${{ steps.wf.outputs.mode }}
          path: |
            citizen-service/artifacts/snapshot.json
            citizen-service/artifacts/snapshot.aep
            citizen-service/artifacts/snapshot.sig.json
            frontend/public/data/snapshot.aep
            frontend/public/data/snapshot.sig.json
            frontend/public/data/snapshot.frontend.json
            frontend/public/data/snapshot.history.json
