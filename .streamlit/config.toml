[theme]
primaryColor = "#0369a1"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f4f8"
textColor = "#1e293b"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
# Отключить анонимную аналитику использования (опционально)
gatherUsageStats = false
